services:
    postgres:
        image: postgres:16-alpine
        container_name: connectai-poc-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: connectai
            POSTGRES_PASSWORD: connectai
            POSTGRES_DB: connectai_poc
        ports:
            - '5432:5432'
        volumes:
            - connectai_poc_pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U connectai -d connectai_poc']
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    connectai_poc_pgdata:
